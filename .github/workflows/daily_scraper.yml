name: Tekser Daily Aggregator

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape-and-load:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPER_URLS: ${{ secrets.SCRAPER_URLS }}
          SCRAPER_PAGES: ${{ vars.SCRAPER_PAGES }}
          TG_PUBLIC_CHANNELS: ${{ secrets.TG_PUBLIC_CHANNELS }}
          WRITE_REPORTS: ${{ vars.WRITE_REPORTS }}
          DAILY_REPORT_DEDUP: ${{ vars.DAILY_REPORT_DEDUP }}
        run: python src/main.py
